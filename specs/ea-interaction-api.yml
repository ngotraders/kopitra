openapi: 3.0.0
info:
  title: FX Copy Trading API
  version: 1.0.0
servers:
  - url: https://api.example.com/v1
paths:
  /sessions:
    post:
      summary: Create a new session and retrieve account settings and state
      operationId: createSession
      parameters:
        - $ref: '#/components/parameters/XEaKey'
        - $ref: '#/components/parameters/XEaVersion'
      responses:
        '200':
          description: Session created successfully with account settings and previous state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '400':
          description: Invalid identification key or version
        '403':
          description: Session already exists

  /session/revoke:
    post:
      summary: Invalidate a session token
      operationId: revokeSession
      parameters:
        - $ref: '#/components/parameters/Authorization'
        - $ref: '#/components/parameters/XEaKey'
        - $ref: '#/components/parameters/XEaVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Session invalidated successfully
        '400':
          description: Bad Request
        '401':
          description: Unauthorized

  /messages:
    get:
      summary: Retrieve messages
      operationId: getMessages
      parameters:
        - $ref: '#/components/parameters/Authorization'
        - $ref: '#/components/parameters/XEaKey'
        - $ref: '#/components/parameters/XEaVersion'
        - in: header
          name: If-None-Match
          schema:
            type: string
          description: ETag of the last received message
      responses:
        '200':
          description: Messages retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Message'
        '304':
          description: No new messages
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
    post:
      summary: Send messages to the server
      operationId: postMessages
      parameters:
        - $ref: '#/components/parameters/Authorization'
        - $ref: '#/components/parameters/XEaKey'
        - $ref: '#/components/parameters/XEaVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/Message'
      responses:
        '200':
          description: Messages sent successfully
        '400':
          description: Bad Request
        '401':
          description: Unauthorized

components:
  parameters:
    Authorization:
      in: header
      name: Authorization
      required: true
      schema:
        type: string
      description: Session token for authentication
    XEaKey:
      in: header
      name: X-Ea-Key
      required: true
      schema:
        type: string
      description: Identification key for the trading account
    XEaVersion:
      in: header
      name: X-Ea-Version
      required: true
      schema:
        type: string
      description: API version

  schemas:
    SessionResponse:
      type: object
      properties:
        token:
          type: string
        role:
          type: string
        lastConnectionState:
          type: object
          properties:
            positions:
              type: array
              items:
                $ref: '#/components/schemas/Position'
            orders:
              type: array
              items:
                $ref: '#/components/schemas/Order'

    Message:
      type: object
      properties:
        messageId:
          type: string
        content:
          type: string
        timestamp:
          type: string
          format: date-time

    Position:
      type: object
      properties:
        tradeId:
          type: string
        ticketNo:
          type: string
        symbol:
          type: string
        tradeType:
          type: string
          enum: [buy, sell]
        quantity:
          type: number

    Order:
      type: object
      properties:
        copyTradeId:
          type: string
        symbol:
          type: string
        tradeType:
          type: string
        orderAmount:
          type: number
        percentageOfBalance:
          type: number
        leverage:
          type: number
